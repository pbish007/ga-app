name: Fresh-tenant smoke (PMB-121)

on:
  # Run automatically after every successful production deploy.
  workflow_run:
    workflows: ["Deploy to Vercel (Production)"]
    types: [completed]
  # Also allow manual dispatch for preview/staging runs.
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target URL (defaults to production)"
        required: false
        default: "https://ga-app-taupe.vercel.app"

concurrency:
  group: smoke
  cancel-in-progress: false

jobs:
  smoke:
    # For workflow_run triggers only run when the upstream deploy succeeded.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Resolve target URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "base_url=${{ github.event.inputs.base_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://ga-app-taupe.vercel.app" >> "$GITHUB_OUTPUT"
          fi

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run fresh-tenant smoke
        env:
          BASE_URL: ${{ steps.url.outputs.base_url }}
          PLATFORM_ADMIN_EMAIL: ${{ secrets.SMOKE_PLATFORM_ADMIN_EMAIL }}
          PLATFORM_ADMIN_PASSWORD: ${{ secrets.SMOKE_PLATFORM_ADMIN_PASSWORD }}
        run: bash apps/web/scripts/smoke-fresh-tenant.sh

      - name: File GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
          TARGET_URL: ${{ steps.url.outputs.base_url }}
        with:
          script: |
            const workflow = process.env.WORKFLOW_NAME;
            const target = process.env.TARGET_URL;
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Smoke failed: ${workflow} @ ${sha}`;
            const body = [
              `**Workflow:** ${workflow}`,
              `**Target:** ${target}`,
              `**Commit:** ${context.sha}`,
              `**Ref:** ${context.ref}`,
              `**Actor:** @${context.actor}`,
              `**Run:** ${runUrl}`,
              ``,
              `The fresh-tenant smoke (PMB-121) failed after a production deploy.`,
              `Check the run log for the first failing assertion.`,
              ``,
              `Filed automatically by the failure-notification step. See \`docs/runbooks/observability.md\`.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'smoke', 'workflow-failure'],
              assignees: ['pbish007'],
            });
