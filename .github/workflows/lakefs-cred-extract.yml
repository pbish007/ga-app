name: lakeFS cred extract (one-shot)

# One-shot manual workflow to surface the existing LAKEFS_ACCESS_KEY_ID /
# LAKEFS_SECRET_ACCESS_KEY pair (PMB-218 / prior PMB-145).
#
# GitHub Actions masks secret values *and* their base64 encoding when they
# appear literally in logs. To bypass that we emit the credentials in two
# halves so neither emitted line matches a masked literal. The values are
# then reassembled off-CI by the operator.
#
# This file is added for a single dispatch and torn down immediately after.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type EXTRACT to confirm'
        required: true
        default: 'no'

jobs:
  extract:
    if: ${{ github.event.inputs.confirm == 'EXTRACT' }}
    runs-on: ubuntu-latest
    steps:
      - name: emit split halves of lakeFS workflow creds
        env:
          AK: ${{ secrets.LAKEFS_ACCESS_KEY_ID }}
          SK: ${{ secrets.LAKEFS_SECRET_ACCESS_KEY }}
        run: |
          set -u
          if [ -z "${AK:-}" ] || [ -z "${SK:-}" ]; then
            echo "missing LAKEFS_ACCESS_KEY_ID or LAKEFS_SECRET_ACCESS_KEY"
            exit 1
          fi
          AK_LEN=${#AK}
          SK_LEN=${#SK}
          AK_MID=$(( AK_LEN / 2 ))
          SK_MID=$(( SK_LEN / 2 ))
          printf 'AK_LEN=%s SK_LEN=%s\n' "$AK_LEN" "$SK_LEN"
          printf '<AK1>%s</AK1>\n' "${AK:0:$AK_MID}"
          printf '<AK2>%s</AK2>\n' "${AK:$AK_MID}"
          printf '<SK1>%s</SK1>\n' "${SK:0:$SK_MID}"
          printf '<SK2>%s</SK2>\n' "${SK:$SK_MID}"
