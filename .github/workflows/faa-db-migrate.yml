name: FAA DB migrate (one-shot)

# Apply a single SQL file from packages/db/migrations/ to the FAA Supabase
# project (FAA_DATABASE_URL). Distinct from db-migrate.yml, which runs against
# the tenant Neon database (DATABASE_URL_DIRECT).
#
# Each FAA migration is currently idempotent (`add column if not exists`,
# `create schema if not exists`, etc.), so re-runs are safe. There is no
# schema_migrations tracking table on the FAA project yet — we re-dispatch
# the workflow per file as needed.

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'Filename under packages/db/migrations/, e.g. 0025_faa_registry_manifest_fingerprints.sql'
        type: string
        required: true

permissions:
  contents: read
  issues: write

concurrency:
  group: faa-db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Confirm psql is available
        run: psql --version

      - name: Validate migration file exists
        env:
          MIGRATION_FILE: ${{ inputs.migration_file }}
        run: |
          set -euo pipefail
          case "$MIGRATION_FILE" in
            */*|..*) echo "::error::migration_file must be a bare filename, not a path"; exit 64 ;;
          esac
          target="packages/db/migrations/$MIGRATION_FILE"
          test -f "$target" || { echo "::error::missing $target"; exit 65; }

      - name: Apply migration to FAA Supabase
        env:
          FAA_DATABASE_URL: ${{ secrets.FAA_DATABASE_URL }}
          MIGRATION_FILE: ${{ inputs.migration_file }}
          # Supabase pooler URLs omit ?sslmode= by convention but require TLS.
          # PGSSLMODE forces psql to negotiate TLS regardless of the URL.
          PGSSLMODE: require
        run: |
          set -euo pipefail
          if [ -z "${FAA_DATABASE_URL:-}" ]; then
            echo "::error::FAA_DATABASE_URL secret is not set."; exit 64
          fi
          target="packages/db/migrations/$MIGRATION_FILE"
          echo "Applying $target to FAA Supabase…"
          psql --set ON_ERROR_STOP=1 --no-psqlrc --quiet "$FAA_DATABASE_URL" \
            -1 --file="$target"
          echo "Applied $MIGRATION_FILE."

      - name: Verify snapshot_manifest columns (post-0025)
        if: inputs.migration_file == '0025_faa_registry_manifest_fingerprints.sql'
        env:
          FAA_DATABASE_URL: ${{ secrets.FAA_DATABASE_URL }}
          PGSSLMODE: require
        run: |
          set -euo pipefail
          psql --set ON_ERROR_STOP=1 --no-psqlrc "$FAA_DATABASE_URL" -c "\d faa_registry.snapshot_manifest"

      - name: Verify FAA registry roles (post-0034)
        if: inputs.migration_file == '0034_faa_registry_roles.sql'
        env:
          FAA_DATABASE_URL: ${{ secrets.FAA_DATABASE_URL }}
          PGSSLMODE: require
        run: |
          set -euo pipefail
          # Both roles exist as NOINHERIT NOLOGIN templates.
          psql --set ON_ERROR_STOP=1 --no-psqlrc "$FAA_DATABASE_URL" -At <<'SQL'
            SELECT rolname || ' canlogin=' || rolcanlogin || ' inherit=' || rolinherit
            FROM pg_roles
            WHERE rolname IN ('faa_registry_pipeline_rw','faa_registry_runtime_ro')
            ORDER BY rolname;
          SQL

          # pipeline_rw can write; runtime_ro is SELECT-only on a representative table.
          # has_table_privilege returns t/f per privilege; we assert by counting trues.
          psql --set ON_ERROR_STOP=1 --no-psqlrc "$FAA_DATABASE_URL" -At <<'SQL'
            SELECT 'pipeline_rw write privs on snapshot_manifest=' ||
              count(*)::text || '/4'
            FROM (VALUES ('SELECT'),('INSERT'),('UPDATE'),('DELETE')) v(priv)
            WHERE has_table_privilege('faa_registry_pipeline_rw',
              'faa_registry.snapshot_manifest', v.priv);

            SELECT 'runtime_ro write privs on snapshot_manifest=' ||
              count(*)::text || '/3 (expect 0)'
            FROM (VALUES ('INSERT'),('UPDATE'),('DELETE')) v(priv)
            WHERE has_table_privilege('faa_registry_runtime_ro',
              'faa_registry.snapshot_manifest', v.priv);

            SELECT 'runtime_ro SELECT on snapshot_manifest=' ||
              has_table_privilege('faa_registry_runtime_ro',
                'faa_registry.snapshot_manifest','SELECT')::text;
          SQL

      - name: Verify FAA registry audit log (post-0035)
        if: inputs.migration_file == '0035_faa_registry_audit_log.sql'
        env:
          FAA_DATABASE_URL: ${{ secrets.FAA_DATABASE_URL }}
          PGSSLMODE: require
        run: |
          set -euo pipefail
          # Table + the two non-trivial indexes (request_id + n_number/accessed_at)
          # all exist with the columns we shipped.
          psql --set ON_ERROR_STOP=1 --no-psqlrc "$FAA_DATABASE_URL" -c "\d faa_registry.faa_registry_audit_log"
          psql --set ON_ERROR_STOP=1 --no-psqlrc "$FAA_DATABASE_URL" -At <<'SQL'
            SELECT 'idx_n_number=' || count(*)::text
            FROM pg_indexes
            WHERE schemaname='faa_registry'
              AND tablename='faa_registry_audit_log'
              AND indexname='faa_registry_audit_log_n_number_accessed_at';

            SELECT 'idx_request_id=' || count(*)::text
            FROM pg_indexes
            WHERE schemaname='faa_registry'
              AND tablename='faa_registry_audit_log'
              AND indexname='faa_registry_audit_log_request_id';

            SELECT 'has_request_id_column=' ||
              has_column_privilege(current_user,
                'faa_registry.faa_registry_audit_log','request_id','SELECT')::text;
          SQL

      - name: File GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
          MIGRATION_FILE: ${{ inputs.migration_file }}
        with:
          script: |
            const workflow = process.env.WORKFLOW_NAME;
            const migration = process.env.MIGRATION_FILE;
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Workflow failed: ${workflow} (${migration}) @ ${sha}`;
            const body = [
              `**Workflow:** ${workflow}`,
              `**Migration:** ${migration}`,
              `**Commit:** ${context.sha}`,
              `**Ref:** ${context.ref}`,
              `**Actor:** @${context.actor}`,
              `**Run:** ${runUrl}`,
              ``,
              `Filed automatically by the failure-notification step. See \`docs/runbooks/observability.md\`.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'workflow-failure', 'faa-db-migrate'],
              assignees: ['pbish007'],
            });
