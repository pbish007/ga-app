name: DB diagnose (production)

# TEMPORARY read-only diagnostic for PMB-70. Connects with the same
# DATABASE_URL_DIRECT GitHub secret the migrate workflow uses and prints the
# connecting role, its privileges on schema public, and the schema_migrations
# ledger. No writes. Delete this workflow once PMB-70 is resolved.

on:
  workflow_dispatch:

concurrency:
  group: db-migrate-prod
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm psql is available
        run: psql --version

      - name: Diagnose role + privileges + ledger
        env:
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
        run: |
          psql --no-psqlrc "$DATABASE_URL_DIRECT" <<'SQL'
          \set ON_ERROR_STOP off
          \echo '== identity =='
          SELECT current_user, session_user, current_database();
          \echo '== roles current_user is a member of =='
          SELECT r.rolname AS member_of
          FROM pg_auth_members m
          JOIN pg_roles r ON r.oid = m.roleid
          JOIN pg_roles u ON u.oid = m.member
          WHERE u.rolname = current_user;
          \echo '== schema public: owner + my privileges =='
          SELECT n.nspname,
                 pg_get_userbyid(n.nspowner) AS owner,
                 has_schema_privilege(current_user,'public','CREATE') AS can_create,
                 has_schema_privilege(current_user,'public','USAGE')  AS can_usage
          FROM pg_namespace n WHERE n.nspname='public';
          \echo '== schema_migrations: existence + owner =='
          SELECT c.relname, pg_get_userbyid(c.relowner) AS owner
          FROM pg_class c JOIN pg_namespace n ON n.oid=c.relnamespace
          WHERE n.nspname='public' AND c.relname='schema_migrations';
          \echo '== ledger contents (errors here mean no SELECT/USAGE) =='
          SELECT filename FROM public.schema_migrations ORDER BY filename;
          \echo '== ledger count =='
          SELECT count(*) AS recorded FROM public.schema_migrations;
          SQL
