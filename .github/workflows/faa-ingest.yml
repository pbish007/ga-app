name: FAA Registry Ingest

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: faa-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # R2 / Cloudflare — provisioned in PMB-104 DevOps sub-task
      R2_ACCOUNT_ID: ${{ secrets.FAA_R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.FAA_R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.FAA_R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: faa-registry
      # Supabase FAA project — provisioned in PMB-104 DevOps sub-task
      FAA_DATABASE_URL: ${{ secrets.FAA_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run FAA ingest
        run: pnpm --filter faa-pipeline ingest
