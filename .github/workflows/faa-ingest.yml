name: FAA Registry Ingest

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: faa-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # GH Actions run id — surfaced into pipeline_runs.run_id for correlation.
      GITHUB_RUN_ID: ${{ github.run_id }}
      # R2 / Cloudflare — provisioned in PMB-114 (R0 envelope).
      R2_ACCOUNT_ID: ${{ secrets.FAA_R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.FAA_R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.FAA_R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: faa-registry
      # Supabase FAA project — provisioned in PMB-114 (R0 envelope).
      FAA_DATABASE_URL: ${{ secrets.FAA_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run FAA ingest
        run: pnpm --filter faa-pipeline ingest

      - name: File GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
        with:
          script: |
            const workflow = process.env.WORKFLOW_NAME;
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Workflow failed: ${workflow} @ ${sha}`;
            const body = [
              `**Workflow:** ${workflow}`,
              `**Commit:** ${context.sha}`,
              `**Ref:** ${context.ref}`,
              `**Trigger:** ${context.eventName}`,
              `**Actor:** @${context.actor}`,
              `**Run:** ${runUrl}`,
              ``,
              `Check \`faa_registry.pipeline_runs\` for the matching row + \`error_message\`. See \`docs/runbooks/observability.md\`.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'workflow-failure', 'faa-ingest'],
              assignees: ['pbish007'],
            });
