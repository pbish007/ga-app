name: FAA public-schema inventory (one-shot)

# Read-only inventory of the FAA Supabase project's `public` schema to
# drive the PMB-232 RLS fix.

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: faa-public-schema-inventory
  cancel-in-progress: false

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Confirm psql is available
        run: psql --version

      - name: Diagnose conninfo (no value reveal)
        env:
          FAA_DATABASE_URL: ${{ secrets.FAA_DATABASE_URL }}
        run: |
          set -eu
          if [ -z "${FAA_DATABASE_URL:-}" ]; then
            echo "::error::FAA_DATABASE_URL is empty"; exit 64
          fi
          len="${#FAA_DATABASE_URL}"
          # Detect leading scheme without revealing secret content.
          case "$FAA_DATABASE_URL" in
            postgres://*)   scheme=postgres ;;
            postgresql://*) scheme=postgresql ;;
            *)              scheme=other ;;
          esac
          # Detect a couple of structural markers that affect parsing.
          case "$FAA_DATABASE_URL" in *"?"*) has_query=yes ;; *) has_query=no ;; esac
          case "$FAA_DATABASE_URL" in *"@"*) has_at=yes ;; *) has_at=no ;; esac
          case "$FAA_DATABASE_URL" in *" "*) has_space=yes ;; *) has_space=no ;; esac
          # Newlines are very common via copy-paste through the GH UI.
          # Detect a trailing newline without printing the body.
          if printf '%s' "$FAA_DATABASE_URL" | od -c | tail -1 | grep -q '\\n'; then
            has_trailing_nl=yes
          else
            has_trailing_nl=no
          fi
          echo "URL_LEN=$len SCHEME=$scheme HAS_QUERY=$has_query HAS_AT=$has_at HAS_SPACE=$has_space HAS_TRAILING_NL=$has_trailing_nl"

      - name: Probe connection with select 1
        env:
          FAA_DATABASE_URL: ${{ secrets.FAA_DATABASE_URL }}
          PGSSLMODE: require
        run: |
          set -eu
          psql --set ON_ERROR_STOP=1 --no-psqlrc "$FAA_DATABASE_URL" -c "select 1 as ok;" || {
            ec=$?
            echo "::warning::probe with raw URL failed ec=$ec, retrying with trimmed URL"
            # Strip leading/trailing whitespace including CR/LF
            trimmed="$(printf '%s' "$FAA_DATABASE_URL" | tr -d '\r\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
            psql --set ON_ERROR_STOP=1 --no-psqlrc "$trimmed" -c "select 1 as ok_trimmed;"
          }

      - name: Inventory public schema
        env:
          FAA_DATABASE_URL: ${{ secrets.FAA_DATABASE_URL }}
          PGSSLMODE: require
        run: |
          set -euo pipefail
          trimmed="$(printf '%s' "$FAA_DATABASE_URL" | tr -d '\r\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          sql_file="$(mktemp --suffix=.sql)"
          cat > "$sql_file" <<'SQL'
          \echo ============================================================
          \echo Relations in public (pg_class):
          \echo ============================================================
          select
            n.nspname  as schema,
            c.relname  as relation,
            case c.relkind
              when 'r' then 'table'
              when 'p' then 'partitioned table'
              when 'v' then 'view'
              when 'm' then 'materialized view'
              when 'f' then 'foreign table'
              when 'S' then 'sequence'
              else c.relkind::text
            end as kind,
            c.relrowsecurity as rls_enabled,
            c.relforcerowsecurity as rls_forced,
            pg_size_pretty(pg_total_relation_size(c.oid)) as total_size,
            obj_description(c.oid, 'pg_class') as comment
          from pg_class c
          join pg_namespace n on n.oid = c.relnamespace
          where n.nspname = 'public'
            and c.relkind in ('r','p','v','m','f','S')
          order by c.relkind, c.relname;

          \echo ============================================================
          \echo information_schema.tables (matches Supabase advisor scope):
          \echo ============================================================
          select table_schema, table_name, table_type
          from information_schema.tables
          where table_schema = 'public'
          order by table_type, table_name;

          \echo ============================================================
          \echo RLS policies on public.*:
          \echo ============================================================
          select schemaname, tablename, policyname, permissive, roles, cmd, qual, with_check
          from pg_policies
          where schemaname = 'public'
          order by tablename, policyname;

          \echo ============================================================
          \echo Row counts per table in public:
          \echo ============================================================
          do $$
          declare
            r record;
            cnt bigint;
          begin
            for r in
              select n.nspname as s, c.relname as t
              from pg_class c
              join pg_namespace n on n.oid = c.relnamespace
              where n.nspname = 'public' and c.relkind in ('r','p')
              order by c.relname
            loop
              execute format('select count(*) from %I.%I', r.s, r.t) into cnt;
              raise notice '% . % => % rows', r.s, r.t, cnt;
            end loop;
          end;
          $$;

          \echo ============================================================
          \echo Extensions and their install schema:
          \echo ============================================================
          select e.extname, n.nspname as schema, e.extversion
          from pg_extension e
          join pg_namespace n on n.oid = e.extnamespace
          order by n.nspname, e.extname;

          \echo ============================================================
          \echo Table grants on public.* for anon / authenticated / public:
          \echo ============================================================
          select grantee, table_name, privilege_type
          from information_schema.role_table_grants
          where table_schema = 'public'
            and grantee in ('anon','authenticated','public')
          order by grantee, table_name, privilege_type;

          \echo ============================================================
          \echo Schema USAGE grants on public:
          \echo ============================================================
          select grantee, privilege_type
          from information_schema.usage_privileges
          where object_schema = 'public'
            and object_type = 'SCHEMA'
            and grantee in ('anon','authenticated','public');
          SQL

          psql --set ON_ERROR_STOP=1 --no-psqlrc --quiet "$trimmed" --file="$sql_file"
          rm -f "$sql_file"
