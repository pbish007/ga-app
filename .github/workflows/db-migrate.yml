name: DB migrate (production)

# Canonical path for applying SQL migrations to the production Postgres.
#
# Runs packages/db/scripts/migrate.sh against the Neon DIRECT (non-pooled)
# endpoint. The script is idempotent: it tracks applied filenames in
# schema_migrations and re-runs are no-ops, so a dispatch with nothing new
# pending is safe.
#
# DATABASE_URL_DIRECT is a Vercel sensitive (write-only) env var that cannot
# be read back via `vercel env run`, so it is stored as a GitHub Actions secret
# and injected directly into the migrate step.

on:
  workflow_dispatch:
    inputs:
      synthetic_fail:
        description: 'Force a synthetic failure to verify the alert path. Skips the migrate step.'
        type: boolean
        default: false
        required: false

permissions:
  contents: read
  issues: write

concurrency:
  group: db-migrate-prod
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Synthetic failure (test the alert path; does not touch the DB)
        if: ${{ inputs.synthetic_fail == true }}
        run: |
          echo "::error::Synthetic failure requested via workflow_dispatch input." >&2
          exit 1

      # ubuntu-latest ships a postgresql-client (psql >= 14); no install step.
      - name: Confirm psql is available
        run: psql --version

      - name: Apply pending migrations
        env:
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
        run: bash packages/db/scripts/migrate.sh

      - name: File GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
        with:
          script: |
            const workflow = process.env.WORKFLOW_NAME;
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Workflow failed: ${workflow} @ ${sha}`;
            const body = [
              `**Workflow:** ${workflow}`,
              `**Commit:** ${context.sha}`,
              `**Ref:** ${context.ref}`,
              `**Actor:** @${context.actor}`,
              `**Run:** ${runUrl}`,
              ``,
              `Filed automatically by the failure-notification step. See \`docs/runbooks/observability.md\`.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'workflow-failure'],
              assignees: ['pbish007'],
            });
