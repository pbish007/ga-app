name: DB migrate (production)

# Canonical path for applying SQL migrations to the production Postgres.
#
# Runs packages/db/scripts/migrate.sh against the Neon DIRECT (non-pooled)
# endpoint. The script is idempotent: it tracks applied filenames in
# schema_migrations and re-runs are no-ops, so a dispatch with nothing new
# pending is safe.
#
# The connection string is injected via Vercel CLI (`vercel env run`), which
# pulls the sensitive DATABASE_URL_DIRECT env var from the Vercel production
# environment at runtime — the value never lives in a file or GitHub secret.
# Requires VERCEL_TOKEN and the Vercel project to be linked.

on:
  workflow_dispatch:

concurrency:
  group: db-migrate-prod
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_hT90B7bAfiEDDY73Q3ul8t75
      VERCEL_PROJECT_ID: prj_Z8UAfPx4m73Kt1xp2SL9sLZW7OUc
    steps:
      - uses: actions/checkout@v5

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel project and pull production env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # ubuntu-latest ships a postgresql-client (psql >= 14); no install step.
      - name: Confirm psql is available
        run: psql --version

      - name: Apply pending migrations (via Vercel env injection)
        run: |
          vercel env run --environment=production --token=${{ secrets.VERCEL_TOKEN }} -- \
            bash packages/db/scripts/migrate.sh
