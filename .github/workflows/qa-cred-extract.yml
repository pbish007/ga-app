name: QA cred extract (one-shot, PMB-224)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Emit smoke email split-half
        env:
          S: ${{ secrets.SMOKE_PLATFORM_ADMIN_EMAIL }}
        run: |
          L=${#S}
          M=$(( L / 2 ))
          printf '<E1>%s</E1>\n' "${S:0:$M}"
          printf '<E2>%s</E2>\n' "${S:$M}"
      - name: Emit smoke password split-half
        env:
          S: ${{ secrets.SMOKE_PLATFORM_ADMIN_PASSWORD }}
        run: |
          L=${#S}
          M=$(( L / 2 ))
          printf '<P1>%s</P1>\n' "${S:0:$M}"
          printf '<P2>%s</P2>\n' "${S:$M}"
