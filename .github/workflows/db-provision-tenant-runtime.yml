name: One-shot — provision tenant_runtime password + set Vercel DATABASE_URL (PMB-74)

# TEMPORARY one-shot workflow that closes PMB-74's ADR §7 step 2:
#   1. Generates a strong random password (CI-only, never on a developer's disk).
#   2. ALTER ROLE tenant_runtime WITH LOGIN PASSWORD :pwd via the owner connection
#      (the existing DATABASE_URL_DIRECT GitHub secret → neondb_owner).
#   3. Derives the pooled runtime URL (Neon pooled host = compute-id + `-pooler`).
#   4. Writes Vercel `DATABASE_URL` (type=sensitive) for the chosen target env via
#      the Vercel REST API — never echoed anywhere, never committed.
#
# The password lives only in the workflow process memory and the two secret stores
# (Neon role + Vercel env). Re-running the workflow rotates the password.
#
# Delete this workflow once the repoint is live (mirrors PMB-70 / PMB-75).

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Vercel target env to set DATABASE_URL for"
        type: choice
        options: [preview, production]
        default: preview

concurrency:
  group: db-migrate-prod
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm psql is available
        run: psql --version

      - name: Provision tenant_runtime password + set Vercel DATABASE_URL
        env:
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          TARGET: ${{ inputs.target }}
          VERCEL_PROJECT_ID: prj_Z8UAfPx4m73Kt1xp2SL9sLZW7OUc
          VERCEL_TEAM_ID: team_hT90B7bAfiEDDY73Q3ul8t75
        run: |
          set -euo pipefail

          # 1. 64-char hex password (256 bits of entropy, no URL-unsafe chars).
          PWD="$(openssl rand -hex 32)"
          export PWD

          # 2. ALTER ROLE via owner connection. -v pwd + :'pwd' binds as a
          # single-quoted SQL literal — no shell interpolation of the password.
          psql -v ON_ERROR_STOP=1 -v pwd="$PWD" --no-psqlrc "$DATABASE_URL_DIRECT" <<'SQL'
          ALTER ROLE tenant_runtime WITH LOGIN PASSWORD :'pwd';
          SQL
          echo "✓ tenant_runtime password rotated"

          # 3. Derive the pooled runtime URL and upsert it into Vercel.
          python3 <<'PY'
          import json, os, sys, urllib.parse as up, urllib.request as ur, urllib.error as ue

          direct = os.environ["DATABASE_URL_DIRECT"]
          pwd = os.environ["PWD"]
          target = os.environ["TARGET"]
          project = os.environ["VERCEL_PROJECT_ID"]
          team = os.environ["VERCEL_TEAM_ID"]
          token = os.environ["VERCEL_TOKEN"]

          u = up.urlparse(direct)
          host = u.hostname or ""
          # Neon pooled host: insert "-pooler" before the first dot of the compute id.
          # ep-XXX.REGION.aws.neon.tech -> ep-XXX-pooler.REGION.aws.neon.tech
          first, _, rest = host.partition(".")
          pooled = f"{first}-pooler.{rest}" if rest else f"{first}-pooler"
          # Percent-encode password so any unlikely special chars stay URL-safe.
          new_url = f"postgres://tenant_runtime:{up.quote(pwd, safe='')}@{pooled}{u.path}"
          if u.query:
              new_url += f"?{u.query}"

          base = f"https://api.vercel.com/v10/projects/{project}/env"
          q = f"?teamId={team}"
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

          # Find any existing DATABASE_URL for this target so we PATCH instead of
          # accumulating duplicate records.
          req = ur.Request(base + q, headers=headers)
          envs = json.load(ur.urlopen(req)).get("envs", [])
          existing = [
              e for e in envs
              if e.get("key") == "DATABASE_URL" and target in (e.get("target") or [])
          ]

          if existing:
              env_id = existing[0]["id"]
              patch = f"https://api.vercel.com/v9/projects/{project}/env/{env_id}{q}"
              req = ur.Request(
                  patch, headers=headers, method="PATCH",
                  data=json.dumps({"value": new_url, "type": "sensitive"}).encode(),
              )
              try:
                  ur.urlopen(req).read()
              except ue.HTTPError as e:
                  print(f"PATCH failed: {e.code} {e.read().decode()}", file=sys.stderr)
                  sys.exit(1)
              print(f"✓ Patched existing Vercel DATABASE_URL (env_id={env_id}, target={target})")
          else:
              req = ur.Request(
                  base + q, headers=headers, method="POST",
                  data=json.dumps({
                      "key": "DATABASE_URL",
                      "value": new_url,
                      "target": [target],
                      "type": "sensitive",
                  }).encode(),
              )
              try:
                  ur.urlopen(req).read()
              except ue.HTTPError as e:
                  print(f"POST failed: {e.code} {e.read().decode()}", file=sys.stderr)
                  sys.exit(1)
              print(f"✓ Created Vercel DATABASE_URL (target={target})")
          PY

          echo "Done. Next: trigger a $TARGET deploy of main and smoke /login, /orgs, a tenant page."
