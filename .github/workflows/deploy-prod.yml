name: Deploy to Vercel (Production)

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: vercel-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_hT90B7bAfiEDDY73Q3ul8t75
      VERCEL_PROJECT_ID: prj_Z8UAfPx4m73Kt1xp2SL9sLZW7OUc
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link project (no-op if already linked)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production (Vercel builds server-side)
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

      - name: File GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
        with:
          script: |
            const workflow = process.env.WORKFLOW_NAME;
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Workflow failed: ${workflow} @ ${sha}`;
            const body = [
              `**Workflow:** ${workflow}`,
              `**Commit:** ${context.sha}`,
              `**Ref:** ${context.ref}`,
              `**Actor:** @${context.actor}`,
              `**Run:** ${runUrl}`,
              ``,
              `Filed automatically by the failure-notification step. See \`docs/runbooks/observability.md\`.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'workflow-failure'],
              assignees: ['pbish007'],
            });
