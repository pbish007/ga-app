name: Deploy to Vercel (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_hT90B7bAfiEDDY73Q3ul8t75
      VERCEL_PROJECT_ID: prj_Z8UAfPx4m73Kt1xp2SL9sLZW7OUc
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link project (no-op if already linked)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production (Vercel builds server-side)
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
