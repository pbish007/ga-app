name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Verify TLS gate accepts a compliant URL
        env:
          DATABASE_URL: postgres://ci:ci@example.invalid/db?sslmode=require
        run: pnpm verify:tls

      - name: Verify TLS gate rejects a non-TLS URL
        env:
          DATABASE_URL: postgres://ci:ci@example.invalid/db?sslmode=disable
        run: |
          if pnpm verify:tls; then
            echo "TLS gate should have rejected sslmode=disable" >&2
            exit 1
          fi
          echo "TLS gate correctly rejected sslmode=disable"

      - name: Build
        run: pnpm build
