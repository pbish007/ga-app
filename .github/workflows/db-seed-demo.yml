name: DB seed demo (production)

# Manual, guarded reseed of the board-acceptance demo org ("Blue Sky Aviation
# (Demo)", PMB-60). Replaces the seed half of the retired
# POST /api/admin/bootstrap-demo endpoint (PMB-62).
#
# Blast radius is the demo org + its three demo users only: the seed library
# deletes and recreates exactly those rows and nothing else. It is NOT a
# production data path — real tenants create their own data through the app.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESEED-DEMO to confirm wiping + reseeding the demo org'
        required: true
        default: ''

permissions:
  contents: read
  issues: write

concurrency:
  group: db-seed-demo-prod
  cancel-in-progress: false

jobs:
  seed:
    if: ${{ inputs.confirm == 'RESEED-DEMO' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Seed demo org
        env:
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
        run: |
          if [ -z "${DATABASE_URL_DIRECT}" ]; then
            echo "::error::DATABASE_URL_DIRECT secret is not set on this repo." >&2
            exit 1
          fi
          node apps/web/scripts/seed-demo.mjs

      - name: File GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
        with:
          script: |
            const workflow = process.env.WORKFLOW_NAME;
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Workflow failed: ${workflow} @ ${sha}`;
            const body = [
              `**Workflow:** ${workflow}`,
              `**Commit:** ${context.sha}`,
              `**Ref:** ${context.ref}`,
              `**Actor:** @${context.actor}`,
              `**Run:** ${runUrl}`,
              ``,
              `Filed automatically by the failure-notification step. See \`docs/runbooks/observability.md\`.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'workflow-failure'],
              assignees: ['pbish007'],
            });
